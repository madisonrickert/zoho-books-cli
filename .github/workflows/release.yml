name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # for GitHub release
  id-token: write  # for PyPI trusted publishing

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Verify tag matches pyproject version
        id: version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(uv run python -c 'import tomllib,sys;print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag v$tag_version does not match pyproject version $pkg_version"
            exit 1
          fi
          echo "version=$tag_version" >> "$GITHUB_OUTPUT"

      - name: Build sdist and wheel
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/*

  # PyPI publishing via Trusted Publishing (OIDC, no tokens).
  # To enable: on PyPI go to your project → Publishing → add a trusted publisher for
  #   owner: madisonrickert, repository: zoho-books-cli, workflow: release.yml
  # Then remove the `if: false` guard below and push a new tag.
  pypi-publish:
    needs: build
    if: false
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/zoho-books-cli/
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
