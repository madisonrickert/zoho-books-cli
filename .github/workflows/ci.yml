name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Sync dependencies
        run: uv sync --extra dev --python ${{ matrix.python }}

      - name: Ruff (lint)
        run: uv run --python ${{ matrix.python }} ruff check

      - name: Ruff (format check)
        run: uv run --python ${{ matrix.python }} ruff format --check

      - name: Pytest
        run: uv run --python ${{ matrix.python }} pytest

      - name: detect-secrets scan
        run: |
          uv run --python ${{ matrix.python }} detect-secrets scan --baseline .secrets.baseline
          uv run --python ${{ matrix.python }} detect-secrets audit --diff .secrets.baseline .secrets.baseline || true
