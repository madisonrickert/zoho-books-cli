repos:
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
      - id: clippy
        args: ["--all-targets", "--", "-D", "warnings"]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: '(^\.secrets\.baseline$|^tests/fixtures/)'

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: no-personal-data
        name: no-personal-data
        entry: scripts/check_no_personal_data.py
        language: system
        # Path-based match so .jsonl / .ndjson are covered (pre-commit's
        # `identify` library does not classify them as a known type).
        files: '\.(py|rs|json|jsonl|ndjson|yaml|yml|md|toml|txt|cfg|ini)$'
